project:
  name: it-operations-flagship
  profile: enterprise-it-operations

compile:
  sources:
    - type: okf-directory
      path: ./services
    - type: okf-directory
      path: ./runbooks
    - type: okf-directory
      path: ./incidents
    - type: okf-directory
      path: ./policies
      
  targets:
    - type: ir-json
      out: dist/agent-knowledge-ir.json
    - type: mcp-resources-manifest
      out: dist/mcp-resources.json
    - type: eval-dataset
      out: dist/eval-dataset.jsonl
    - type: okf-bundle
      out: dist/okf-bundle
    - type: policy-bundle
      out: dist/policies.json

policies:
  path: ./policies

runtime:
  mode: sandbox
