compile:
  sources:
    - type: okf-directory
      path: ./services
    - type: okf-directory
      path: ./runbooks
    - type: okf-directory
      path: ./incidents
    - type: okf-directory
      path: ./policies

  targets:
    - type: context-pack
      out: dist/agent-knowledge-ir.json
    - type: mcp-resources
      out: dist/mcp-resources.json
    - type: eval-dataset
      out: dist/eval-dataset.jsonl
    - type: policy-bundle
      out: dist/policies.json

controlPlane:
  policies:
    disableDangerousTools: true
    requireApprovalFor:
      - restart_service
      - deploy_service
      - execute_command
