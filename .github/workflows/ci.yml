name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML
        run: pnpm validate:yaml

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit Tests
        run: pnpm test -- --run

      - name: Security and Contract Tests
        run: pnpm test:mcp

      - name: Conformance Tests
        run: pnpm test:conformance

      - name: Evals
        run: pnpm evals

      - name: Validate Sample Bundle
        run: pnpm validate:bundle --bundle sample-data/.okf --format json

      - name: Migrate Bundle Dry Run
        run: pnpm migrate:bundle --bundle sample-data/.okf --check

      - name: Validate Career Bundle
        run: pnpm akcp validate --config examples/career/akcp.yaml

      - name: Compile Career Bundle
        run: pnpm akcp compile --config examples/career/akcp.yaml

      - name: Conformance Run
        run: pnpm akcp conformance run
